<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#12082b" />
    <title>Digital Prize Wheel</title>
  </head>
  <body>
    <div id="app">
      <main class="stage">
        <header class="stage__header">
          <h1 class="stage__title">Winner's Wheel</h1>
          <p class="stage__hint" id="stage-hint">Swipe down to spin!</p>
        </header>
        <div id="wheel-root" class="stage__wheel"></div>
        <aside class="stage__panel demo-controls" aria-label="Controls">
          <button type="button" id="open-config" class="demo-controls__btn">⚙ Settings</button>
          <button type="button" id="force-grand" class="demo-controls__btn">Force Grand Prize</button>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
